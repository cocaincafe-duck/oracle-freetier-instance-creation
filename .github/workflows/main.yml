name: Oracle Cloud Free Tier Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Inject Secrets into oci.env
        run: |
          # Ghi đè file Private Key
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_private_key.pem
          chmod 600 oci_api_private_key.pem
          
          # Nối thêm các thông số API bí mật vào cuối file oci.env có sẵn của bạn
          echo "" >> oci.env
          echo "OCI_USER_OCID=${{ secrets.OCI_USER_OCID }}" >> oci.env
          echo "OCI_TENANCY_OCID=${{ secrets.OCI_TENANCY_OCID }}" >> oci.env
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> oci.env
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> oci.env
          echo "OCI_KEY_FILE=$(pwd)/oci_api_private_key.pem" >> oci.env

      - name: Run Hunter Bot
        run: |
          python main.py
